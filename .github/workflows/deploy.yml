name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # Python 3.11 es más compatible

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller
        python -c "import nltk; nltk.download('punkt'); nltk.download('vader_lexicon'); nltk.download('stopwords')"

    - name: Generar .exe
      run: |
        pyinstaller --onefile --name "CSV_Analyzer" `
          --add-data "app/processors;processors" `
          --hidden-import=nltk `
          --hidden-import=nltk.tokenize `
          --hidden-import=nltk.corpus `
          --hidden-import=nltk.sentiment `
          --hidden-import=nltk.sentiment.vader `
          --collect-data=nltk `
          app/app.py

    - name: Subir artifact
      uses: actions/upload-artifact@v4
      with:
        name: CSV_Analyzer_Windows
        path: dist/CSV_Analyzer.exe

    - name: Subir a Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/CSV_Analyzer.exe
      if: startsWith(github.ref, 'refs/tags/')
